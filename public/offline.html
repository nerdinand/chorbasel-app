<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | ChorBasel-App</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        max-width: 28rem;
        padding: 1.5rem;
        border: 1px solid;
        border-radius: 0.75rem;
      }
      h1 {
        margin-top: 0;
      }
      p {
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>The app could not reach the network. Please reconnect and try again.</p>
    </main>
  </body>
</html>
